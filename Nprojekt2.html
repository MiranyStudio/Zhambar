<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submission Portal</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #eceff1; 
            padding: 10px; 
            margin: 0; 
        }
        .container { 
            max-width: 600px; 
            width: 95%; 
            margin: 20px auto; 
            background: white; 
            padding: 20px; 
            border-radius: 8px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            box-sizing: border-box; 
        }
        h2 { color: #00796b; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-top: 0; }
        
        input, textarea, button { 
            width: 100%; 
            padding: 14px; 
            margin: 10px 0; 
            border: 1px solid #ccc; 
            border-radius: 6px; 
            box-sizing: border-box; 
            font-size: 16px; 
        }
        
        button { 
            background: #00796b; 
            color: white; 
            border: none; 
            cursor: pointer; 
            font-weight: bold; 
            transition: 0.2s;
        }
        
        button:active { background: #004d40; transform: scale(0.98); }
        button:disabled { background: #999; cursor: not-allowed; }

        .success-msg { 
            color: #00796b; 
            font-weight: bold; 
            text-align: center; 
            display: none; 
            margin-top: 10px;
        }

        .footer-link { text-align: center; margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; }
        .footer-link a { color: #00796b; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Product Submission Portal</h2>
    <p style="font-size: 14px; color: #666;">Submit your details below. Admin will review them in the Google Sheet.</p>
    
    <form id="productForm" action="https://script.google.com/macros/s/AKfycbxpMnmrBFgs5yBDlg7so61uw3DL_9DJGrUKknMUwOaLqGrVEO9kW-bya0i5jw1eDOZw/exec" method="POST">
        
        <input type="email" name="Email" placeholder="Your Email Address" required>
        <input type="tel" name="Phone" placeholder="Phone Number" required>
        
        <textarea name="Notes" rows="4" placeholder="Notes about the product..."></textarea>
        
        <button type="submit" id="submitBtn">Submit to Admin</button>
    </form>

    <p id="thanks" class="success-msg">Success! Information sent to Admin Sheet.</p>
    
    <div class="footer-link">
        <a href="index.html">← Back to Home</a>
    </div>
</div>

<script>
    const form = document.getElementById('productForm');
    const btn = document.getElementById('submitBtn');
    const thanks = document.getElementById('thanks');

    form.onsubmit = function() {
        btn.innerText = "Sending...";
        btn.disabled = true;
        // The data is now heading to your Google Sheet!
        
        // Optional: Show a success message after a short delay
        setTimeout(() => {
            thanks.style.display = "block";
            btn.innerText = "Sent!";
        }, 1500);
    };
</script>

</body>
</html>
