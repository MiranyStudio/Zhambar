<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submission Portal</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eceff1; padding: 10px; margin: 0; }
        .container { max-width: 600px; width: 95%; margin: 20px auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); box-sizing: border-box; }
        h2 { color: #00796b; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-top: 0; }
        input, textarea, button { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { background: #00796b; color: white; border: none; cursor: pointer; font-weight: bold; }
        .admin-section { margin-top: 30px; border-top: 2px dashed #ccc; padding-top: 20px; }
        .hidden { display: none; }
        .msg-card { background: #f9f9f9; padding: 15px; margin-bottom: 15px; border-left: 5px solid #00796b; word-wrap: break-word; font-size: 14px; }
        .msg-img { max-width: 100%; height: auto; margin-top: 10px; border-radius: 4px; display: block; border: 1px solid #ddd; }
        .loading { text-align: center; color: #666; font-style: italic; }
    </style>
</head>
<body>

<div class="container" id="submissionForm">
    <h2>Product Submission Portal</h2>
    <p id="limitText">Daily Limit: 30 Submissions</p>
    
    <form id="productForm" action="https://formspree.io/f/xbdpqqlr" method="POST" enctype="multipart/form-data">
        <input type="email" name="Email" placeholder="Your Email Address" required>
        <input type="tel" name="Phone" placeholder="Phone Number" required>
        <label style="font-size: 12px;">Upload Product Picture:</label>
        <input type="file" name="Upload" accept="image/*">
        <textarea name="Notes" rows="3" placeholder="Notes..."></textarea>
        <button type="submit" id="submitBtn">Submit to Admin</button>
    </form>
</div>

<div class="container admin-section">
    <h3>Admin Login</h3>
    <div id="loginArea">
        <input type="password" id="adminPass" placeholder="Enter Admin Password">
        <button onclick="checkLogin()">View All Messages</button>
    </div>

    <div id="adminPanel" class="hidden">
        <h3>All Submitted Messages</h3>
        <div id="messageList">
            <p class="loading">Loading messages from server...</p>
        </div>
        <button onclick="location.reload()" style="background:#555">Logout / Refresh</button>
    </div>
</div>

<script>
    // 1. LOGIN LOGIC
    async function checkLogin() {
        const pass = document.getElementById('adminPass').value;
        if (pass === "admin123") {
            document.getElementById('loginArea').classList.add('hidden');
            document.getElementById('adminPanel').classList.remove('hidden');
            fetchMessages();
        } else {
            alert("Incorrect Password");
        }
    }

    // 2. FETCH DATA FROM FORMSPREE
    async function fetchMessages() {
        const list = document.getElementById('messageList');
        
        try {
            // NOTE: Formspree API requires an API Key for "GET" requests.
            // If you haven't set up the API key yet, this part will show an error.
            const response = await fetch('https://formspree.io/api/0/forms/xbdpqqlr/submissions', {
                headers: {
                    'Authorization': 'Bearer YOUR_FORMSPREE_API_KEY_HERE'
                }
            });
            
            const data = await response.json();
            list.innerHTML = "";

            if (data.length === 0) {
                list.innerHTML = "<p>No messages found.</p>";
                return;
            }

            data.forEach(sub => {
                const img = sub.upload ? `<img src="${sub.upload}" class="msg-img">` : "";
                list.innerHTML += `
                    <div class="msg-card">
                        <strong>Email:</strong> ${sub.email} <br>
                        <strong>Phone:</strong> ${sub.phone || 'N/A'} <br>
                        <strong>Notes:</strong> ${sub.message || 'N/A'} <br>
                        ${img}
                        <br><small>${new Date(sub.created_at).toLocaleString()}</small>
                    </div>`;
            });
        } catch (error) {
            list.innerHTML = "<p style='color:red;'>Error: Access Denied. Make sure to add your Formspree API Key to the code.</p>";
        }
    }
</script>

</body>
</html>
