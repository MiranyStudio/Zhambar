<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submission Portal</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eceff1; padding: 10px; margin: 0; }
        .container { max-width: 600px; width: 95%; margin: 20px auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); box-sizing: border-box; }
        h2 { color: #00796b; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-top: 0; }
        input, textarea, button { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { background: #00796b; color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:active { background: #004d40; transform: scale(0.98); }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .admin-section { margin-top: 30px; border-top: 2px dashed #ccc; padding-top: 20px; text-align: center; }
        .footer-link { text-align: center; margin-top: 10px; }
        .footer-link a { color: #00796b; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Product Submission Portal</h2>
    <p id="limitText" style="color: #666;">Daily Limit: 30 Submissions</p>
    
    <form id="productForm" action="https://formspree.io/f/xbdpqqlr" method="POST" enctype="multipart/form-data">
        
        <input type="email" name="Email" placeholder="Your Email Address" required>
        <input type="tel" name="Phone" placeholder="Phone Number" required>
        
        <label style="font-size: 14px; color: #555; display: block; margin-bottom: 5px;">Upload Product Picture:</label>
        <input type="file" name="Product_Photo" accept="image/*">
        
        <textarea name="Notes" rows="4" placeholder="Notes about the product..."></textarea>
        
        <button type="submit" id="submitBtn">Submit to Admin</button>
    </form>
    
    <div class="footer-link">
        <a href="index.html">← Back to Home</a>
    </div>
</div>

<div class="container admin-section">
    <h3>Admin Control</h3>
    <p>To see messages from friends and other phones, check your dashboard:</p>
    <a href="https://formspree.io/login" target="_blank">
        <button style="background: #444;">Open Global Admin Panel</button>
    </a>
</div>

<script>
    const form = document.getElementById('productForm');
    const submitBtn = document.getElementById('submitBtn');

    // Device-specific limit check
    let today = new Date().toLocaleDateString();
    let savedDate = localStorage.getItem('lastSubmitDate');
    let count = parseInt(localStorage.getItem('submitCount')) || 0;

    // Reset counter if it's a new day
    if (savedDate !== today) {
        count = 0;
        localStorage.setItem('lastSubmitDate', today);
        localStorage.setItem('submitCount', 0);
    }

    if (count >= 30) {
        submitBtn.disabled = true;
        submitBtn.innerText = "Daily Limit Reached";
    }

    form.onsubmit = function() {
        // Increase counter on click
        count++;
        localStorage.setItem('submitCount', count);
    };
</script>

</body>
</html>
