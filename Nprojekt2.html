<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brwa | Cloud Portal</title>
    <style>
        :root { --primary: #00ffa3; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .card { background: var(--card); width: 100%; max-width: 500px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px; box-sizing: border-box; }
        
        h2 { color: var(--primary); margin: 0 0 15px 0; font-weight: 800; }
        label { display: block; font-size: 11px; color: var(--primary); margin-bottom: 5px; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; }
        
        input, textarea, button { width: 100%; padding: 14px; margin-bottom: 15px; background: #0f172a; border: 1px solid #334155; border-radius: 12px; color: white; font-size: 16px; box-sizing: border-box; outline: none; transition: 0.3s; }
        
        button { background: var(--primary); color: #000; font-weight: 700; border: none; cursor: pointer; }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        button:disabled { background: #334155; color: #64748b; cursor: not-allowed; }

        /* Mailbox UI */
        .mail-list { margin-top: 20px; }
        .mail-item { background: #0f172a; padding: 15px; border-radius: 12px; margin-bottom: 12px; display: flex; align-items: center; gap: 15px; border-left: 4px solid var(--primary); border-bottom: 1px solid #334155; }
        .mail-img { width: 65px; height: 65px; border-radius: 10px; object-fit: cover; border: 1px solid var(--primary); cursor: pointer; }
        .mail-info { font-size: 14px; flex: 1; }
        .mail-info b { color: var(--primary); font-size: 15px; }
        .mail-info p { margin: 4px 0 0 0; color: #94a3b8; font-size: 13px; line-height: 1.4; }
        
        .hidden { display: none; }
        .loader { text-align: center; color: var(--primary); font-size: 14px; padding: 20px; font-weight: 600; }
    </style>
</head>
<body>

<div class="card" id="formSection">
    <h2>Submit Product</h2>
    <p style="color: #94a3b8; font-size: 14px; margin-bottom: 20px;">Upload your product info and photo to the admin mailbox.</p>
    <form id="pForm">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="example@mail.com" required>
        
        <label>Phone Number</label>
        <input type="tel" id="phone" placeholder="0750 XXX XXXX" required>
        
        <label>Select Photo (Gallery/Camera)</label>
        <input type="file" id="photo" accept="image/*" required>
        
        <label>Product Details</label>
        <textarea id="notes" rows="3" placeholder="Enter notes here..."></textarea>
        
        <button type="submit" id="sBtn">Send to Mailbox</button>
    </form>
</div>

<div class="card">
    <h3 style="margin:0 0 15px 0; color: #94a3b8; font-size: 16px;">Admin Mailbox</h3>
    
    <div id="loginArea">
        <input type="password" id="adminPass" placeholder="Enter Admin Password">
        <button onclick="login()" style="background: #334155; color: white;">Open Inbox</button>
    </div>

    <div id="mailboxArea" class="hidden">
        <button onclick="fetchMail()" style="background: #1e293b; color: var(--primary); border: 1px solid var(--primary); margin-bottom: 15px;">Refresh Messages ↻</button>
        <div id="loading" class="loader hidden">Syncing with Cloud...</div>
        <div id="mailList"></div>
    </div>
</div>

<div style="font-size: 12px; color: #475569; margin-top: 20px;">Brwa &bull; CIS IT 2026</div>

<script>
    // 1. YOUR UPDATED SCRIPT URL
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwLBh21ge-JTh1pqd_QRTvNtO9YvvkxcQAleHw6ttgvq_FrIv9KW5DVXwW4KG4tFM2ZgQ/exec';

    const form = document.getElementById('pForm');
    const btn = document.getElementById('sBtn');

    // FORM SUBMISSION (SEND DATA)
    form.onsubmit = function(e) {
        e.preventDefault();
        btn.innerText = "Syncing with Cloud...";
        btn.disabled = true;

        const file = document.getElementById('photo').files[0];
        const reader = new FileReader();

        reader.onload = function() {
            const payload = {
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                notes: document.getElementById('notes').value,
                photo: reader.result
            };

            fetch(scriptURL, {
                method: 'POST',
                body: JSON.stringify(payload)
            }).then(() => {
                alert("✓ Success! Information delivered.");
                btn.innerText = "Send to Mailbox";
                btn.disabled = false;
                form.reset();
            }).catch(err => {
                alert("Error sending data.");
                btn.disabled = false;
            });
        };
        reader.readAsDataURL(file);
    };

    // ADMIN LOGIN
    function login() {
        if(document.getElementById('adminPass').value === "admin123") {
            document.getElementById('loginArea').classList.add('hidden');
            document.getElementById('mailboxArea').classList.remove('hidden');
            fetchMail();
        } else {
            alert("Wrong Password");
        }
    }

    // FETCH MAIL (RECEIVE DATA)
    function fetchMail() {
        const list = document.getElementById('mailList');
        const loader = document.getElementById('loading');
        list.innerHTML = '';
        loader.classList.remove('hidden');

        fetch(scriptURL)
            .then(res => res.json())
            .then(data => {
                loader.classList.add('hidden');
                // Newest messages first
                data.reverse().forEach(item => {
                    list.innerHTML += `
                        <div class="mail-item">
                            <img src="${item.photo}" class="mail-img" onclick="window.open(this.src)">
                            <div class="mail-info">
                                <b>${item.email}</b><br>
                                <span style="font-size:12px;">${item.phone}</span>
                                <p>${item.notes || 'No extra notes provided.'}</p>
                            </div>
                        </div>
                    `;
                });
            });
    }
</script>

</body>
</html>
