<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brwa | Product Portal</title>
    <style>
        :root { --primary: #00ffa3; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; min-height: 100vh; }
        .card { background: var(--card); width: 100%; max-width: 450px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05); box-sizing: border-box; margin-bottom: 20px; }
        h2 { color: var(--primary); margin: 0 0 10px 0; font-weight: 800; }
        label { display: block; font-size: 11px; color: var(--primary); margin-bottom: 5px; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; }
        input, textarea { width: 100%; padding: 14px; margin-bottom: 18px; background: #0f172a; border: 1px solid #334155; border-radius: 12px; color: white; font-size: 16px; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); }
        input[type="file"] { padding: 10px; background: #1e293b; border: 1px dashed var(--primary); cursor: pointer; }
        button { width: 100%; padding: 16px; background: var(--primary); color: #000; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; font-size: 16px; }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        button:disabled { background: #334155; color: #64748b; }
        .success-banner { display: none; background: rgba(0, 255, 163, 0.1); color: var(--primary); padding: 15px; border-radius: 10px; text-align: center; margin-top: 15px; border: 1px solid var(--primary); font-weight: bold; }
        .hidden { display: none; }
        .footer { margin-top: auto; padding: 20px; font-size: 12px; color: #475569; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <h2>Submit Product</h2>
    <p style="color: #94a3b8; font-size: 14px; margin-bottom: 20px;">Upload a photo directly from your camera roll.</p>
    
    <form id="uploadForm">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="example@mail.com" required>
        
        <label>Phone Number</label>
        <input type="tel" id="phone" placeholder="0750 XXX XXXX" required>
        
        <label>Product Image</label>
        <input type="file" id="photoFile" accept="image/*" required>
        
        <label>Notes</label>
        <textarea id="notes" rows="3" placeholder="Enter product details..."></textarea>
        
        <button type="submit" id="submitBtn">Upload to Admin</button>
    </form>
    <div id="thanks" class="success-banner">✓ UPLOAD SUCCESSFUL!</div>
</div>

<div class="card" style="border: 1px dashed #334155; background: transparent;">
    <h3 style="margin:0 0 10px 0; font-size: 16px; color: #94a3b8;">Admin Dashboard</h3>
    <div id="loginArea">
        <input type="password" id="adminPass" placeholder="Admin Password">
        <button onclick="checkLogin()" style="background: #334155; color: white;">Unlock Sheet</button>
    </div>
    <div id="adminPanel" class="hidden">
        <p style="color: var(--primary); margin-bottom: 10px; font-weight: bold;">Verified ✓</p>
        <a href="https://docs.google.com/spreadsheets/d/1Pno5J9ZXCIpqd1KksXXTI_RVqPI4FSk6PH4Y7eSfAQE/edit" target="_blank" style="text-decoration:none;">
            <button style="background: white; color: black;">Open Google Sheet</button>
        </a>
    </div>
</div>

<div class="footer">Developed by Brwa &bull; CIS IT 2026</div>

<script>
    // YOUR UPDATED WEB APP URL
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzjSl0R52XQ6joxwIMQonHL9XaWbgQ1WM1u-CJKg0oESmTNjSPJrKQ3IIwiDiGggQacgw/exec';
    
    const form = document.getElementById('uploadForm');

    form.addEventListener('submit', e => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const fileInput = document.getElementById('photoFile');
        
        btn.innerText = "Processing Image...";
        btn.disabled = true;

        const file = fileInput.files[0];
        const reader = new FileReader();

        reader.onload = function() {
            const base64Data = reader.result;
            const payload = {
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                notes: document.getElementById('notes').value,
                photo: base64Data
            };

            // Using fetch to send the JSON payload to Google
            fetch(scriptURL, {
                method: 'POST',
                body: JSON.stringify(payload)
            })
            .then(res => {
                document.getElementById('thanks').style.display = "block";
                btn.innerText = "Upload Complete!";
                form.reset();
            })
            .catch(error => {
                console.error('Error!', error.message);
                btn.disabled = false;
                btn.innerText = "Error - Try Again";
            });
        };
        reader.readAsDataURL(file);
    });

    function checkLogin() {
        if (document.getElementById('adminPass').value === "admin123") {
            document.getElementById('loginArea').classList.add('hidden');
            document.getElementById('adminPanel').classList.remove('hidden');
        } else {
            alert("Incorrect Password");
        }
    }
</script>

</body>
</html>
