<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submission Portal</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #eceff1; 
            padding: 10px; 
            margin: 0; 
        }
        .container { 
            max-width: 600px; 
            width: 95%; 
            margin: 20px auto; 
            background: white; 
            padding: 20px; 
            border-radius: 8px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            box-sizing: border-box; 
        }
        h2 { color: #00796b; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-top: 0; }
        
        input, textarea, button { 
            width: 100%; 
            padding: 14px; 
            margin: 10px 0; 
            border: 1px solid #ccc; 
            border-radius: 6px; 
            box-sizing: border-box; 
            font-size: 16px; 
        }
        
        button { 
            background: #00796b; 
            color: white; 
            border: none; 
            cursor: pointer; 
            font-weight: bold; 
            transition: 0.2s;
        }
        
        button:active { background: #004d40; transform: scale(0.98); }
        button:disabled { background: #999; cursor: not-allowed; }

        .admin-section { 
            margin-top: 30px; 
            border-top: 2px dashed #ccc; 
            padding-top: 20px; 
            text-align: center;
        }

        .hidden { display: none; }
        
        .success-msg { 
            color: #00796b; 
            font-weight: bold; 
            text-align: center; 
            display: none; 
            margin-top: 10px;
        }

        .footer-link { text-align: center; margin-top: 20px; }
        .footer-link a { color: #00796b; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container" id="userView">
    <h2>Product Submission Portal</h2>
    <p style="font-size: 14px; color: #666;">Submit your product details below.</p>
    
    <form id="productForm" action="https://script.google.com/macros/s/AKfycbxpMnmrBFgs5yBDlg7so61uw3DL_9DJGrUKknMUwOaLqGrVEO9kW-bya0i5jw1eDOZw/exec" method="POST">
        
        <input type="email" name="Email" placeholder="Your Email Address" required>
        <input type="tel" name="Phone" placeholder="Phone Number" required>
        <textarea name="Notes" rows="4" placeholder="Notes about the product..."></textarea>
        
        <button type="submit" id="submitBtn">Submit to Admin</button>
    </form>

    <p id="thanks" class="success-msg">Success! Your information has been sent.</p>
    
    <div class="footer-link">
        <a href="index.html">← Back to Home</a>
    </div>
</div>

<div class="container admin-section">
    <h3>Admin Control</h3>
    
    <div id="loginArea">
        <input type="password" id="adminPass" placeholder="Enter Admin Password">
        <button onclick="checkLogin()" style="background: #444;">Login to View Messages</button>
    </div>

    <div id="adminPanel" class="hidden">
        <p style="color: #00796b; font-weight: bold;">Login Successful!</p>
        <p>Click below to open your spreadsheet and see all messages:</p>
        
        <a href="https://docs.google.com/spreadsheets/d/1Pno5J9ZXCIpqd1KksXXTI_RVqPI4FSk6PH4Y7eSfAQE/edit?gid=0#gid=0" target="_blank">
            <button style="background: #2e7d32;">Open Google Sheet Admin</button>
        </a>
        
        <button onclick="location.reload()" style="background: #777; margin-top: 10px;">Logout</button>
    </div>
</div>

<script>
    // FORM SUBMISSION LOGIC
    const form = document.getElementById('productForm');
    const btn = document.getElementById('submitBtn');
    const thanks = document.getElementById('thanks');

    form.onsubmit = function() {
        btn.innerText = "Sending...";
        btn.disabled = true;
        
        // Show success message after a delay
        setTimeout(() => {
            thanks.style.display = "block";
            btn.innerText = "Sent!";
        }, 1500);
    };

    // ADMIN LOGIN LOGIC
    function checkLogin() {
        const pass = document.getElementById('adminPass').value;
        if (pass === "admin123") {
            document.getElementById('loginArea').classList.add('hidden');
            document.getElementById('adminPanel').classList.remove('hidden');
        } else {
            alert("Incorrect Password");
        }
    }
</script>

</body>
</html>
