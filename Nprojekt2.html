<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ژامبەر | پۆرتاڵی بەڕێوبەر</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #10b981; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --danger: #ef4444; }
        body { font-family: 'Noto Sans Arabic', sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .card { background: var(--card); width: 100%; max-width: 500px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; margin-bottom: 20px; box-sizing: border-box; }
        
        h2 { color: var(--primary); text-align: center; margin-top: 0; }
        input, textarea, button { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #cbd5e1; box-sizing: border-box; font-family: inherit; }
        
        button { background: var(--primary); color: white; font-weight: bold; border: none; cursor: pointer; transition: 0.3s; }
        button:hover { opacity: 0.9; }
        
        .mail-item { background: #f1f5f9; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; border-right: 5px solid var(--primary); }
        .mail-img { width: 65px; height: 65px; border-radius: 10px; object-fit: cover; cursor: pointer; border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); transition: 0.2s; }
        .mail-img:hover { transform: scale(1.05); }
        
        .mail-info { flex: 1; font-size: 14px; }
        .mail-info b { color: var(--primary); display: block; }
        
        .delete-btn { background: none; color: #94a3b8; border: none; cursor: pointer; font-size: 18px; width: auto; margin: 0; padding: 5px; }

        /* Modal / Pop-up Window */
        #imgModal { display: none; position: fixed; z-index: 9999; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; cursor: zoom-out; }
        #imgModal img { max-width: 90%; max-height: 85%; border-radius: 15px; border: 3px solid white; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        
        .hidden { display: none; }
        .loader { text-align: center; padding: 10px; color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

<div id="imgModal" onclick="this.style.display='none'">
    <img id="modalImg" src="">
</div>

<div class="card">
    <h2>ناردنی بەرهەم</h2>
    <form id="pForm">
        <input type="email" id="email" placeholder="ئیمەیڵ (Email)" required dir="ltr">
        <input type="tel" id="phone" placeholder="ژمارەی مۆبایل" required dir="ltr">
        <input type="file" id="photo" accept="image/*" required>
        <textarea id="notes" rows="2" placeholder="تێبینی زیادە..."></textarea>
        <button type="submit" id="sBtn">ناردن بۆ بەڕێوبەر</button>
    </form>
</div>

<div class="card">
    <h3 style="text-align: center; color: #64748b;">سندوقی نامەکان</h3>
    
    <div id="loginArea">
        <input type="password" id="adminPass" placeholder="وشەی نهێنی">
        <button onclick="login()" style="background: #334155;">چوونە ناوەوە</button>
    </div>

    <div id="mailboxArea" class="hidden">
        <button onclick="fetchMail()" style="background: white; color: var(--primary); border: 1px solid var(--primary); margin-bottom: 15px;">تازەکردنەوە ↻</button>
        <div id="loading" class="loader hidden">خەریکی وەرگرتنی زانیارییەکانە...</div>
        <div id="mailList"></div>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxEgG9ZhH9sfz-f0qByOKt-IuLon_QYjM3BrkasjaTGpzWAWOn6awx3vu9KZz2r9Tsg/exec';

    function login() {
        if(document.getElementById('adminPass').value === "admin123") {
            document.getElementById('loginArea').classList.add('hidden');
            document.getElementById('mailboxArea').classList.remove('hidden');
            fetchMail();
        } else { alert("وشەی نهێنی هەڵەیە!"); }
    }

    // Function to open the Pop-up image
    function openPreview(src) {
        document.getElementById('modalImg').src = src;
        document.getElementById('imgModal').style.display = 'flex';
    }

    function fetchMail() {
        const list = document.getElementById('mailList');
        const loader = document.getElementById('loading');
        list.innerHTML = '';
        loader.classList.remove('hidden');

        fetch(scriptURL)
            .then(res => res.json())
            .then(data => {
                loader.classList.add('hidden');
                if(data.length === 0) {
                    list.innerHTML = '<p style="text-align:center;">هیچ نامەیەک نییە.</p>';
                    return;
                }
                data.reverse().forEach(item => {
                    list.innerHTML += `
                        <div class="mail-item" id="row-${item.rowId}">
                            <img src="${item.photo}" class="mail-img" onclick="openPreview(this.src)">
                            <div class="mail-info">
                                <b>${item.email}</b>
                                <span dir="ltr">${item.phone}</span>
                                <p style="margin: 5px 0 0 0; font-size:13px;">${item.notes || ''}</p>
                            </div>
                            <button class="delete-btn" onclick="serverDelete(${item.rowId})">✕</button>
                        </div>`;
                });
            });
    }

    function serverDelete(rowId) {
        if(!confirm("ئایا دڵنیای لە سڕینەوە؟")) return;
        
        const element = document.getElementById(`row-${rowId}`);
        element.style.opacity = "0.3";
        element.style.pointerEvents = "none";

        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ command: "DELETE", rowId: rowId })
        }).then(() => {
            element.remove();
        });
    }

    document.getElementById('pForm').onsubmit = function(e) {
        e.preventDefault();
        const btn = document.getElementById('sBtn');
        btn.innerText = "خەریکی ناردنە...";
        btn.disabled = true;

        const reader = new FileReader();
        reader.onload = function() {
            fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({
                    email: document.getElementById('email').value,
                    phone: document.getElementById('phone').value,
                    notes: document.getElementById('notes').value,
                    photo: reader.result
                })
            }).then(() => {
                alert("✓ نێردرا!");
                location.reload();
            });
        };
        reader.readAsDataURL(document.getElementById('photo').files[0]);
    };
</script>
</body>
</html>
